services:
  mysql:
    image: mysql:8.0
    container_name: equipment-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: dms_db
      MYSQL_USER: dms_user
      MYSQL_PASSWORD: your_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
    container_name: equipment-management
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DB_TYPE: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: dms_user
      MYSQL_PASSWORD: your_password
      MYSQL_DATABASE: dms_db
      SECRET_KEY: change-me-in-production
      PORT: 5000
    volumes:
      - equipment-uploads:/app/uploads
      - equipment-logs:/app/logs
    restart: unless-stopped

volumes:
  mysql-data:
  equipment-uploads:
  equipment-logs:
