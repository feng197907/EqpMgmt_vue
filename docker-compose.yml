services:
  app:
    build:
      context: .
    container_name: equipment-management
    ports:
      - "5000:5000"
    environment:
      DB_TYPE: sqlite
      DB_PATH: /data/equipment.db
      SECRET_KEY: change-me-in-production
      PORT: 5000
    volumes:
      - equipment-data:/data
      - equipment-uploads:/app/uploads
      - equipment-logs:/app/logs
    restart: unless-stopped

volumes:
  equipment-data:
  equipment-uploads:
  equipment-logs: