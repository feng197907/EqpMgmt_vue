services:
  app:
    build:
      context: .
    container_name: equipment-management
    ports:
      - "5000:5000"
    environment:
      DB_TYPE: sqlite
      DB_PATH: /data/equipment.db
      SECRET_KEY: change-me-in-production
      PORT: 5000
    volumes:
      - ./data:/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped