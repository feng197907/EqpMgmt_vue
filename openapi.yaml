openapi: 3.0.3
info:
  title: Equipment Management API (草案)
  version: 0.1.0
  description: 基础设备查询与状态变更 API 草案
servers:
  - url: http://localhost:5000
paths:
  /api/devices:
    get:
      summary: 获取设备列表
      responses:
        '200':
          description: 设备数组
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /api/devices/{device_id}:
    get:
      summary: 获取设备详情
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 设备对象
        '404':
          description: 未找到
  /api/devices/{device_id}/documents:
    get:
      summary: 获取设备相关文档列表
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 文档数组
  /api/devices/{device_id}/status:
    post:
      summary: 提交设备状态变更（关键状态需管理员审批）
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_status:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: 立即生效
        '202':
          description: 已提交，待审批
        '400':
          description: 参数错误
components: {}
