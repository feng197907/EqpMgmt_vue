[alembic]
script_location = alembic
# The database URL is set programmatically in env.py from settings.SQLALCHEMY_DATABASE_URL.
# This placeholder ensures alembic.ini parses correctly; it will be overridden at runtime.
sqlalchemy.url = mysql+pymysql://root:password@127.0.0.1:3306/equipment_management

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
