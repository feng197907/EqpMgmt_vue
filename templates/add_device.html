{% extends 'base.html' %}
{% block content %}
{% if device %}
<h3 class="mb-3">编辑设备</h3>
{% else %}
<h3 class="mb-3">新增设备</h3>
{% endif %}
<form class="card shadow-sm p-4" method="post">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">设备编码 *</label>
      <input class="form-control" name="device_code" required value="{{ device.device_code if device }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">设备名称 *</label>
      <input class="form-control" name="device_name" required value="{{ device.device_name if device }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">型号</label>
      <input class="form-control" name="model" value="{{ device.model if device }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">位置</label>
      <input class="form-control" name="location" value="{{ device.location if device }}">
    </div>
  </div>
  <div class="mt-4">
    <button class="btn btn-primary" type="submit">保存</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('auth.index') }}">取消</a>
  </div>
</form>
{% endblock %}
