<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 设备档案文档管理系统</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom Styles -->
  <style>
    :root {
      --color-primary: #2563EB;
      --color-primary-hover: #1D4ED8;
      --color-primary-light: #DBEAFE;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --border-color: #E2E8F0;
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --border-radius: 12px;
      --font-sans: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-card {
      background: #fff;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .login-header {
      padding: 2rem 2rem 0;
      text-align: center;
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--color-primary-light);
      border-radius: 16px;
      margin-bottom: 1.5rem;
    }

    .login-logo svg {
      width: 32px;
      height: 32px;
      color: var(--color-primary);
    }

    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 0.5rem;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin: 0;
    }

    .login-body {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-label.required::after {
      content: " *";
      color: #EF4444;
    }

    .form-control {
      width: 100%;
      height: 48px;
      padding: 0 1rem;
      font-size: 1rem;
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: all 0.15s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-control::placeholder {
      color: #94A3B8;
    }

    .btn-login {
      width: 100%;
      height: 48px;
      background: var(--color-primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-login:hover {
      background: var(--color-primary-hover);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .alert {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .alert-danger {
      background: #FEE2E2;
      color: #991B1B;
    }

    .login-footer {
      padding: 1.5rem 2rem;
      background: #F8FAFC;
      border-top: 1px solid var(--border-color);
      text-align: center;
    }

    .login-footer p {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .login-footer code {
      background: #E2E8F0;
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      font-family: "JetBrains Mono", monospace;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/>
            <path d="M12 22V12"/>
          </svg>
        </div>
        <h1 class="login-title">设备档案文档管理系统</h1>
        <p class="login-subtitle">DMS - Device Management System</p>
      </div>

      <div class="login-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ message }}
            </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('auth.login') }}">
          <div class="form-group">
            <label class="form-label required" for="username">用户名</label>
            <input class="form-control" type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
          </div>

          <div class="form-group">
            <label class="form-label required" for="password">密码</label>
            <input class="form-control" type="password" id="password" name="password" placeholder="请输入密码" required>
          </div>

          <button class="btn-login" type="submit">登 录</button>
        </form>
      </div>

      <div class="login-footer">
        <p>默认账号: <code>admin</code> / <code>admin123</code></p>
      </div>
    </div>
  </div>
</body>
</html>
