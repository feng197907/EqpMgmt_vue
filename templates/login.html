<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 设备档案文档管理系统</title>

  <!-- 本地字体（替代 Google Fonts CDN，离线可用） -->
  <link href="{{ url_for('static', filename='vendor/fonts.css') }}" rel="stylesheet">

  <!-- Bootstrap 5（本地） -->
  <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">

  <!-- Custom Styles -->
  <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path d="m3.3 7 8.7 5 8.7-5"/>
            <path d="M12 22V12"/>
          </svg>
        </div>
        <h1 class="login-title">设备档案文档管理系统</h1>
        <p class="login-subtitle">DMS - Device Management System</p>
      </div>

      <div class="login-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              {{ message }}
            </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('auth.login') }}">
          {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
          {% endif %}
          <div class="form-group">
            <label class="form-label required" for="username">用户名</label>
            <input class="form-control" type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
          </div>

          <div class="form-group">
            <label class="form-label required" for="password">密码</label>
            <input class="form-control" type="password" id="password" name="password" placeholder="请输入密码" required>
          </div>

          <button class="btn-login" type="submit">登 录</button>
        </form>

        <div class="text-center mt-3">
          <a href="{{ url_for('password.forgot_password') }}" class="forgot-password-link">
            忘记密码？
          </a>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
