<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘记密码 - 设备档案文档管理系统</title>

  <!-- 本地字体（替代 Google Fonts CDN，离线可用） -->
  <link href="{{ url_for('static', filename='vendor/fonts.css') }}" rel="stylesheet">

  <!-- Bootstrap 5（本地） -->
  <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">

  <!-- Custom Styles -->
  <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="login-title">忘记密码</h1>
        <p class="login-subtitle">提交密码重置请求，管理员将为您处理</p>
      </div>

      <div class="login-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                {% if category == 'success' or category == 'info' %}
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="16"/>
                {% elif category == 'warning' %}
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
                {% else %}
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
                {% endif %}
              </svg>
              {{ message }}
            </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('password.forgot_password') }}">
          <div class="form-group">
            <label class="form-label required" for="username">用户名</label>
            <input
              class="form-control"
              type="text"
              id="username"
              name="username"
              placeholder="请输入您的用户名"
              required
              autofocus
            >
          </div>

          <div class="alert alert-info" style="font-size: 0.875rem; margin-top: 16px;">
            <small>
              <strong>说明：</strong>提交后管理员将收到重置请求，请耐心等待处理。
              如有紧急问题，请联系系统管理员。
            </small>
          </div>

          <div style="display: flex; gap: 12px; margin-top: 20px;">
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary" style="flex: 1; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none;">
              返回登录
            </a>
            <button class="btn-login" type="submit" style="flex: 1;">提交请求</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</body>
</html>
